name: Release CI/CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Frontend Shared Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Upload Frontend Dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-and-release:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact_name: finn-windows-amd64.exe
          - goos: linux
            goarch: amd64
            artifact_name: finn-linux-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: finn-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Frontend Dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Execute Full Autonomous Build Script
        env:
          VERSION: ${{ github.ref_name }}
          SKIP_FRONTEND_BUILD: '1'
        run: |
          chmod +x bin/build.sh
          ./bin/build.sh ${{ matrix.goos }} ${{ matrix.goarch }}

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ matrix.artifact_name }}
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: build
          merge-multiple: true

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="${GITHUB_REF_NAME}" \
            --jq '.body' > release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          fail_on_unmatched_files: true
          body_path: release-notes.md
          append_body: false
          draft: false
          prerelease: false
