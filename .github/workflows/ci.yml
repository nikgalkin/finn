name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: ci-frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: ci-frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Test version calculation
        run: |
          test "$(./bin/next-version.sh '#major' v1.8.0 feat-v1.8.1)" = "v1.8.1"
          test "$(./bin/next-version.sh '#major' v1.8.0)" = "v2.0.0"
          test "$(./bin/next-version.sh '#minor' v1.8.0)" = "v1.9.0"
          test "$(./bin/next-version.sh '#bugfix' v1.8.0)" = "v1.8.1"
          test "$(./bin/next-version.sh 'no marker' v1.8.0)" = "v1.9.0"

  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    needs: backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout code and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_tag=""
          while IFS= read -r candidate; do
            if [[ "$candidate" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              existing_tag="$candidate"
              break
            fi
          done < <(git tag --points-at HEAD --sort=-version:refname)

          if [ -n "$existing_tag" ]; then
            echo "Reusing existing tag $existing_tag"
            echo "tag=$existing_tag" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_message="$(git log -1 --pretty=%B)"
          source_branch="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
              --jq 'map(select(.base.ref == "master")) | .[0].head.ref // ""'
          )"
          echo "Source branch: ${source_branch:-direct push}"

          next_tag="$(./bin/next-version.sh "$commit_message" "" "$source_branch")"
          if git rev-parse --quiet --verify "refs/tags/$next_tag" >/dev/null; then
            echo "Version tag $next_tag already exists on another commit" >&2
            exit 1
          fi

          echo "Calculated tag $next_tag"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Push version tag
        if: steps.version.outputs.created == 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  release:
    name: Release
    needs: tag
    if: needs.tag.outputs.tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
