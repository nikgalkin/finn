name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: ci-frontend-dist
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 1

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: ci-frontend-dist
          path: frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Test version calculation
        run: |
          test "$(./bin/next-version.sh '#major' v1.8.0 feat-v1.8.1)" = "v1.8.1"
          test "$(./bin/next-version.sh '#major' v1.8.0)" = "v2.0.0"
          test "$(./bin/next-version.sh '#minor' v1.8.0)" = "v1.9.0"
          test "$(./bin/next-version.sh '#bugfix' v1.8.0)" = "v1.8.1"
          test "$(./bin/next-version.sh 'no marker' v1.8.0)" = "v1.9.0"
